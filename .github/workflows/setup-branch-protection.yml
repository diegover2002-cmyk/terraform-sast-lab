name: "⚙️ Setup Branch Protection"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'apply' to configure branch protection on main"
        required: true
        default: ""

permissions:
  administration: write

jobs:
  protect-main:
    name: Configure main branch protection
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'apply' }}
    steps:
      - name: Apply branch protection rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const branch = 'main';

            console.log(`Configuring branch protection for ${owner}/${repo}:${branch}`);

            const result = await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts: ['security'],
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                require_code_owner_reviews: true,
                dismiss_stale_reviews: true,
              },
              restrictions: null,
              required_linear_history: false,
              allow_force_pushes: false,
              allow_deletions: false,
            });

            console.log('Branch protection applied successfully.');
            console.log(JSON.stringify(result.data, null, 2));

      - name: Summary
        run: |
          echo "## ✅ Branch protection configured for \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Required status checks | \`security\` (security-check.yml) |" >> $GITHUB_STEP_SUMMARY
          echo "| Up-to-date branch required | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Required approving reviews | 1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Require code owner review | Yes (CODEOWNERS) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dismiss stale reviews | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Allow force pushes | No |" >> $GITHUB_STEP_SUMMARY
          echo "| Allow branch deletion | No |" >> $GITHUB_STEP_SUMMARY
