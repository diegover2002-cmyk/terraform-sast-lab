name: "⚙️ Setup Branch Protection"

# Configures branch protection for both main and develop branches.
# Branching strategy:
#   feature/* | fix/* | chore/* | demo/*  →  PR to develop
#   develop                                →  PR to main (release)
#   release/*                              →  PR to main (hotfix)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'apply' to configure branch protection on main + develop"
        required: true
        default: ""

permissions:
  administration: write

jobs:
  protect-branches:
    name: Configure branch protection
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'apply' }}
    steps:
      - name: Protect develop (feature integration branch)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            console.log(`Configuring branch protection for ${owner}/${repo}:develop`);

            // Ensure develop branch exists before protecting it
            try {
              await github.rest.repos.getBranch({ owner, repo, branch: 'develop' });
            } catch (e) {
              core.warning('develop branch does not exist yet — skipping develop protection. Create the branch first.');
              return;
            }

            const result = await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'develop',
              required_status_checks: {
                strict: true,
                contexts: ['security', 'Security Scan'],
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                require_code_owner_reviews: true,
                dismiss_stale_reviews: true,
              },
              restrictions: null,
              required_linear_history: false,
              allow_force_pushes: false,
              allow_deletions: false,
            });

            console.log('develop branch protection applied.');

      - name: Protect main (releases only)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            console.log(`Configuring branch protection for ${owner}/${repo}:main`);

            const result = await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                // validate-target rejects PRs that don't come from develop or release/*
                contexts: ['validate-target', 'Validate source branch'],
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                require_code_owner_reviews: true,
                dismiss_stale_reviews: true,
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
            });

            console.log('main branch protection applied.');

      - name: Summary
        run: |
          echo "## ✅ Branch protection configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### \`develop\` — feature integration branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Required status checks | \`security\` (security-check.yml) |" >> $GITHUB_STEP_SUMMARY
          echo "| Up-to-date branch required | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Required approving reviews | 1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Require code owner review | Yes (CODEOWNERS) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dismiss stale reviews | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Allow force pushes | No |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### \`main\` — releases only" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Required status checks | \`validate-target\` (validate-pr-target.yml) |" >> $GITHUB_STEP_SUMMARY
          echo "| Linear history required | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Required approving reviews | 1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Require code owner review | Yes (CODEOWNERS) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dismiss stale reviews | Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Allow force pushes | No |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branching strategy:**" >> $GITHUB_STEP_SUMMARY
          echo "\`feature/*\` / \`fix/*\` / \`chore/*\` → PR to \`develop\`" >> $GITHUB_STEP_SUMMARY
          echo "\`develop\` → PR to \`main\` (release)" >> $GITHUB_STEP_SUMMARY
          echo "\`release/*\` → PR to \`main\` (hotfix)" >> $GITHUB_STEP_SUMMARY
