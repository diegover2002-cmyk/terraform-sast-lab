# .github/workflows/terraform-pr.yml
#
# Runs on every PR touching terraform/ or this workflow file.
# Jobs: fmt → validate → tfsec → checkov → plan (all with continue-on-error)
# Final `report` job posts a consolidated Markdown summary to the PR.
#
# READ-ONLY — never modifies Azure resources.
# Secrets are never written to PR comments.

name: Terraform PR



permissions:
  contents: read
  pull-requests: write

jobs:

  # ── 1. Format check ──────────────────────────────────────────────────────────
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.result.outputs.status }}
      detail: ${{ steps.result.outputs.detail }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Check formatting
        id: fmt
        run: terraform fmt -check -recursive terraform/ 2>&1 | tee fmt-output.txt
        continue-on-error: true

      - name: Set output
        id: result
        run: |
          if [ "${{ steps.fmt.outcome }}" = "failure" ]; then
            FILES=$(grep -v '^$' fmt-output.txt | tr '\n' ', ' | sed 's/,$//')
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "detail=Files need formatting: ${FILES}" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "detail=All .tf files are correctly formatted" >> $GITHUB_OUTPUT
          fi

      - name: Fail job if fmt failed
        if: steps.fmt.outcome == 'failure'
        run: exit 1

  # ── 2. Validate ──────────────────────────────────────────────────────────────
  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    needs: fmt
    if: always()
    outputs:
      status: ${{ steps.result.outputs.status }}
      detail: ${{ steps.result.outputs.detail }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init (local backend)
        run: cd terraform && terraform init -backend=false -input=false

      - name: Terraform Validate
        id: validate
        run: cd terraform && terraform validate -no-color 2>&1 | tee validate-output.txt
        continue-on-error: true

      - name: Set output
        id: result
        run: |
          if [ "${{ steps.validate.outcome }}" = "failure" ]; then
            ERR=$(grep -m1 'Error' validate-output.txt || echo "Validation failed")
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "detail=${ERR}" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "detail=Configuration is valid" >> $GITHUB_OUTPUT
          fi

      - name: Fail job if validate failed
        if: steps.validate.outcome == 'failure'
        run: exit 1

  # ── 3. tfsec ─────────────────────────────────────────────────────────────────
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    outputs:
      status: ${{ steps.result.outputs.status }}
      detail: ${{ steps.result.outputs.detail }}

    steps:
      - uses: actions/checkout@v6

      - name: Run tfsec
        id: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          format: lovely
        continue-on-error: true

      - name: Set output
        id: result
        run: |
          if [ "${{ steps.tfsec.outcome }}" = "failure" ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "detail=Issues found — soft-fail, non-blocking" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "detail=No issues found" >> $GITHUB_OUTPUT
          fi

  # ── 4. Checkov ───────────────────────────────────────────────────────────────
  checkov:
    name: Checkov scan
    runs-on: ubuntu-latest
    needs: tfsec
    if: always()
    outputs:
      status: ${{ steps.result.outputs.status }}
      detail: ${{ steps.result.outputs.detail }}

    steps:
      - uses: actions/checkout@v6

      - name: Install checkov
        run: pip install checkov

      - name: Run Checkov
        id: checkov
        run: |
          checkov -d terraform/ \
            --framework terraform \
            --output cli \
            --output sarif \
            --output-file-path . \
            --soft-fail 2>&1 | tee checkov-output.txt
        continue-on-error: true

      - name: Extract summary
        id: summary
        run: |
          PASSED=$(grep -oP 'Passed checks: \K\d+' checkov-output.txt | tail -1 || echo "0")
          FAILED=$(grep -oP 'Failed checks: \K\d+' checkov-output.txt | tail -1 || echo "0")
          echo "passed=${PASSED}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT

      - name: Upload SARIF
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: checkov-sarif
          path: results_tf.sarif

      - name: Set output
        id: result
        run: |
          FAILED="${{ steps.summary.outputs.failed }}"
          PASSED="${{ steps.summary.outputs.passed }}"
          if [ "${FAILED}" != "0" ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "detail=Passed: ${PASSED} / Failed: ${FAILED} — soft-fail, non-blocking" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "detail=Passed: ${PASSED} / Failed: 0" >> $GITHUB_OUTPUT
          fi

  # ── 5. Plan ──────────────────────────────────────────────────────────────────
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    needs: checkov
    if: always()
    outputs:
      status: ${{ steps.result.outputs.status }}
      detail: ${{ steps.result.outputs.detail }}
      add: ${{ steps.summary.outputs.add }}
      change: ${{ steps.summary.outputs.change }}
      destroy: ${{ steps.summary.outputs.destroy }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          cd terraform && terraform init -input=false \
            -backend-config="resource_group_name=rg-lolnotifier-tfstate" \
            -backend-config="storage_account_name=stlolnotifiertfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=lolnotifier.tfstate" \
            -backend-config="subscription_id=$ARM_SUBSCRIPTION_ID" \
            -backend-config="tenant_id=$ARM_TENANT_ID" \
            -backend-config="client_id=$ARM_CLIENT_ID" \
            -backend-config="client_secret=$ARM_CLIENT_SECRET"

      - name: Terraform Plan
        id: plan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_telegram_token: ${{ secrets.TF_VAR_TELEGRAM_TOKEN }}
          TF_VAR_riot_api_key: ${{ secrets.TF_VAR_RIOT_API_KEY }}
          TF_VAR_telegram_chat_id: ${{ secrets.TF_VAR_TELEGRAM_CHAT_ID }}
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}
        run: |
          cd terraform
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Extract plan summary
        id: summary
        run: |
          ADD=$(grep -oP '\d+(?= to add)' terraform/plan_output.txt | tail -1 || echo "0")
          CHANGE=$(grep -oP '\d+(?= to change)' terraform/plan_output.txt | tail -1 || echo "0")
          DESTROY=$(grep -oP '\d+(?= to destroy)' terraform/plan_output.txt | tail -1 || echo "0")
          echo "add=${ADD}" >> $GITHUB_OUTPUT
          echo "change=${CHANGE}" >> $GITHUB_OUTPUT
          echo "destroy=${DESTROY}" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: terraform-plan
          path: terraform/plan_output.txt

      - name: Set output
        id: result
        run: |
          DESTROY="${{ steps.summary.outputs.destroy }}"
          if [ "${{ steps.plan.outcome }}" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "detail=Plan failed — check artifacts for details" >> $GITHUB_OUTPUT
          elif [ "${DESTROY}" != "0" ]; then
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "detail=⚠️ Plan will DESTROY ${DESTROY} resource(s) — review carefully" >> $GITHUB_OUTPUT
          else
            ADD="${{ steps.summary.outputs.add }}"
            CHANGE="${{ steps.summary.outputs.change }}"
            echo "status=success" >> $GITHUB_OUTPUT
            echo "detail=+${ADD} to add, ~${CHANGE} to change, 0 to destroy" >> $GITHUB_OUTPUT
          fi

  # ── 6. PR Report ─────────────────────────────────────────────────────────────
  report:
    name: Post Terraform Report
    runs-on: ubuntu-latest
    needs: [fmt, validate, tfsec, checkov, plan]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
        continue-on-error: true

      - name: Post summary comment
        uses: actions/github-script@v8
        env:
          FMT_STATUS: ${{ needs.fmt.outputs.status }}
          FMT_DETAIL: ${{ needs.fmt.outputs.detail }}
          VALIDATE_STATUS: ${{ needs.validate.outputs.status }}
          VALIDATE_DETAIL: ${{ needs.validate.outputs.detail }}
          TFSEC_STATUS: ${{ needs.tfsec.outputs.status }}
          TFSEC_DETAIL: ${{ needs.tfsec.outputs.detail }}
          CHECKOV_STATUS: ${{ needs.checkov.outputs.status }}
          CHECKOV_DETAIL: ${{ needs.checkov.outputs.detail }}
          PLAN_STATUS: ${{ needs.plan.outputs.status }}
          PLAN_DETAIL: ${{ needs.plan.outputs.detail }}
          PLAN_DESTROY: ${{ needs.plan.outputs.destroy }}
        with:
          script: |
            const fs = require('fs');

            function icon(status) {
              if (status === 'success') return '✅';
              if (status === 'warning') return '⚠️';
              if (status === 'failure') return '❌';
              return '⏭️';
            }

            const statuses = [
              process.env.FMT_STATUS,
              process.env.VALIDATE_STATUS,
              process.env.TFSEC_STATUS,
              process.env.CHECKOV_STATUS,
              process.env.PLAN_STATUS,
            ];

            const overall = statuses.includes('failure')
              ? '❌ **One or more checks failed**'
              : statuses.includes('warning')
              ? '⚠️ **Passed with warnings**'
              : '✅ **All checks passed**';

            const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            const run = `[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            const destroy = parseInt(process.env.PLAN_DESTROY || '0');
            const destroyWarn = destroy > 0
              ? `\n> 🚨 **DESTROY WARNING: ${destroy} resource(s) will be destroyed. Review the plan before merging.**\n`
              : '';

            let planText = '';
            try {
              const raw = fs.readFileSync('plan_output.txt', 'utf8');
              const maxLen = 8000;
              planText = raw.length > maxLen
                ? raw.substring(0, maxLen) + '\n\n... (truncated — see full artifact)'
                : raw;
            } catch (e) {
              planText = 'Plan output not available.';
            }

            const body = [
              `## 🏗️ Terraform PR Report — ${overall}`,
              ``,
              `> PR **#${{ github.event.pull_request.number }}** · Branch \`${{ github.head_ref }}\` · Run ${run} · ${now}`,
              destroyWarn,
              `| Check | Status | Detail |`,
              `|---|---|---|`,
              `| \`terraform fmt\` | ${icon(process.env.FMT_STATUS)} ${process.env.FMT_STATUS} | ${process.env.FMT_DETAIL} |`,
              `| \`terraform validate\` | ${icon(process.env.VALIDATE_STATUS)} ${process.env.VALIDATE_STATUS} | ${process.env.VALIDATE_DETAIL} |`,
              `| tfsec | ${icon(process.env.TFSEC_STATUS)} ${process.env.TFSEC_STATUS} | ${process.env.TFSEC_DETAIL} |`,
              `| Checkov IaC scan | ${icon(process.env.CHECKOV_STATUS)} ${process.env.CHECKOV_STATUS} | ${process.env.CHECKOV_DETAIL} |`,
              `| \`terraform plan\` | ${icon(process.env.PLAN_STATUS)} ${process.env.PLAN_STATUS} | ${process.env.PLAN_DETAIL} |`,
              ``,
              `<details><summary>📄 Terraform Plan Output</summary>`,
              ``,
              `\`\`\`hcl`,
              planText,
              `\`\`\``,
              ``,
              `</details>`,
              ``,
              `> 📦 Artifacts: [terraform-plan](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · [checkov-sarif](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🏗️ Terraform PR Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
