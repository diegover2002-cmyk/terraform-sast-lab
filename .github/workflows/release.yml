# .github/workflows/release.yml
#
# Triggered when a version tag (v*.*.*) is pushed.
# Packages the app as a zip, scans the Docker image with Trivy,
# then deploys to Azure Function App (dev → prod with manual approval).
#
# Required GitHub secrets:
#   ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_TENANT_ID, ARM_SUBSCRIPTION_ID
#
# Secrets NOT stored in GitHub (managed in Azure Key Vault):
#   TELEGRAM_TOKEN, RIOT_API_KEY, TELEGRAM_CHAT_ID

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:

  # ── Package app ──────────────────────────────────────────────────────────────
  build:
    name: Package App
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Create deployment zip
        run: zip -r app.zip . -x "*.git*" -x "tests/*" -x "scripts/*" -x "terraform/*" -x "docs/*" -x ".venv/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: function-app-package
          path: app.zip

  # ── Trivy — Docker image CVE scan ────────────────────────────────────────────
  trivy:
    name: Trivy (Docker CVE scan)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Build image for scanning
        run: docker build -t lolnotifier:${{ github.ref_name }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lolnotifier:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

  # ── Deploy to dev ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    needs: [build, trivy]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-package

      - uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","tenantId":"${{ secrets.ARM_TENANT_ID }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}"}'

      - name: Deploy to Function App (dev)
        uses: azure/functions-action@v1
        with:
          app-name: func-lolnotifier-dev
          package: app.zip

  # ── Deploy to prod (requires manual approval in GitHub Environments) ─────────
  deploy-prod:
    name: Deploy → Prod
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-package

      - uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","tenantId":"${{ secrets.ARM_TENANT_ID }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}"}'

      - name: Deploy to Function App (prod)
        uses: azure/functions-action@v1
        with:
          app-name: func-lolnotifier-prod
          package: app.zip
