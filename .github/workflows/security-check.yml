# .github/workflows/security-check.yml
#
# Unified Terraform Security Check — runs on every PR touching terraform/
#
# Layers:
#   1. Checkov  — IaC static analysis (all terraform/ files)
#   2. tfsec    — deterministic rule scan (gold-tier modules only)
#   3. AI check — Azure OpenAI semantic analysis against MCSB Must-priority
#                 controls + exception gate (gold-tier modules only)
#
# Posts ONE unified comment on the PR. Updates it on re-runs.

name: "🔒 Terraform Security Check"

on:
  pull_request:
    branches: [develop]
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Layer 1: Checkov ──────────────────────────────────────────────────
      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        id: checkov
        run: |
          checkov -d terraform/ \
            --framework terraform \
            --output cli \
            --soft-fail 2>&1 | tee checkov-output.txt
        continue-on-error: true

      - name: Extract Checkov summary
        id: checkov-summary
        run: |
          PASSED=$(grep -oP 'Passed checks: \K\d+' checkov-output.txt | tail -1 || echo "0")
          FAILED=$(grep -oP 'Failed checks: \K\d+' checkov-output.txt | tail -1 || echo "0")
          SKIPPED=$(grep -oP 'Skipped checks: \K\d+' checkov-output.txt | tail -1 || echo "0")
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      # ── Detect gold-tier changes ──────────────────────────────────────────
      - name: Detect gold-tier Terraform changes
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            -- 'terraform/modules/storage/**' \
               'terraform/modules/keyvault/**' \
               'terraform/modules/aks/**' \
            | tr '\n' ' ' | xargs)
          echo "files=${FILES}" >> $GITHUB_OUTPUT
          echo "Changed gold-tier files: '${FILES}'"

      # ── Layers 2 & 3: tfsec + AI (gold-tier only) ────────────────────────
      - name: Install tfsec
        if: steps.changed.outputs.files != ''
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh \
            | bash

      - name: Run tfsec on gold-tier modules
        if: steps.changed.outputs.files != ''
        run: |
          tfsec terraform/modules/ \
            --include-passed \
            --format json \
            --out tfsec-output.json \
            --soft-fail
        continue-on-error: true

      - name: Set up Python
        if: steps.changed.outputs.files != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.changed.outputs.files != ''
        run: pip install requests

      - name: Run AI Security Check
        id: ai-check
        if: steps.changed.outputs.files != ''
        continue-on-error: true
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
        run: |
          python .github/scripts/azure_openai_tf_check.py \
            --changed-files ${{ steps.changed.outputs.files }} \
            --tfsec-output tfsec-output.json \
            --output ai-check-output.txt

      - name: No gold-tier changes detected
        if: steps.changed.outputs.files == ''
        run: |
          printf '_No gold-tier Terraform changes detected — AI Security Check skipped._\n' \
            > ai-check-output.txt


      # ── Enforce gate decision ─────────────────────────────────────────────
      - name: Enforce security gate
        if: always()
        run: |
          if [ -f ai-check-output.txt ] && grep -q "Gate: BLOCKED" ai-check-output.txt; then
            echo "::error::Security gate BLOCKED — unregistered FAIL findings must be remediated or registered in exceptions-registry.json before merging."
            exit 1
          fi
          echo "Security gate passed."

      # ── Post unified report ───────────────────────────────────────────────
      - name: Post unified security report
        if: always()
        uses: actions/github-script@v7
        env:
          CHECKOV_PASSED:  ${{ steps.checkov-summary.outputs.passed }}
          CHECKOV_FAILED:  ${{ steps.checkov-summary.outputs.failed }}
          CHECKOV_SKIPPED: ${{ steps.checkov-summary.outputs.skipped }}
        with:
          script: |
            const fs = require('fs');

            const passed  = parseInt(process.env.CHECKOV_PASSED  || '0');
            const failed  = parseInt(process.env.CHECKOV_FAILED  || '0');
            const skipped = parseInt(process.env.CHECKOV_SKIPPED || '0');

            let aiSection = '';
            try {
              aiSection = fs.readFileSync('ai-check-output.txt', 'utf8').trim();
            } catch (e) {
              aiSection = '_AI Security Check output not available._';
            }

            const blocked  = aiSection.includes('Gate: BLOCKED');
            const aiPassed = aiSection.includes('Gate: PASSED');
            const checkovOk = failed === 0;

            const overall = (blocked || !checkovOk)
              ? '❌ **Action required**'
              : '✅ **All checks passed**';

            const checkovStatus = failed > 0 ? '⚠️ warning' : '✅ passed';

            const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const run = `[#${{ github.run_number }}](${runUrl})`;

            const body = [
              `## 🔒 Terraform Security Report — ${overall}`,
              ``,
              `> PR **#${{ github.event.pull_request.number }}** · Branch \`${{ github.head_ref }}\` · Run ${run} · ${now}`,
              ``,
              `---`,
              ``,
              `### 📋 Checkov IaC Scan — ${checkovStatus}`,
              ``,
              `| Result | Count |`,
              `|---|---|`,
              `| ✅ Passed | ${passed} |`,
              `| ❌ Failed | ${failed} |`,
              `| ⏭️ Skipped (registered exceptions) | ${skipped} |`,
              ``,
              `---`,
              ``,
              aiSection,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🔒 Terraform Security Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body.slice(0, 65000),
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body.slice(0, 65000),
              });
            }

  # ── Plan-level Checkov (requires ARM credentials) ────────────────────────────
  checkov-tfplan:
    name: "Checkov (Terraform plan)"
    runs-on: ubuntu-latest
    needs: security
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Check ARM credentials availability
        id: arm-creds
        run: |
          if [[ -n "$ARM_CLIENT_ID" ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "ARM credentials detected — running plan-level Checkov."
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "ARM credentials not configured — falling back to focused static scan."
          fi
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}

      # ── Plan-level path: terraform plan → JSON → checkov ─────────────────────
      - name: Setup Terraform
        if: steps.arm-creds.outputs.available == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Terraform Init (CI environment)
        if: steps.arm-creds.outputs.available == 'true'
        working-directory: terraform/environments/ci
        run: terraform init -backend=false
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Plan
        if: steps.arm-creds.outputs.available == 'true'
        working-directory: terraform/environments/ci
        run: |
          terraform plan \
            -out=tfplan.out \
            -refresh=false \
            -input=false
        env:
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        continue-on-error: true

      - name: Convert plan to JSON
        if: steps.arm-creds.outputs.available == 'true'
        working-directory: terraform/environments/ci
        run: terraform show -json tfplan.out > tfplan.json

      - name: Checkov — plan-level analysis
        if: steps.arm-creds.outputs.available == 'true'
        run: |
          checkov \
            --file terraform/environments/ci/tfplan.json \
            --framework terraform_plan \
            --output cli \
            --soft-fail 2>&1 | tee checkov-plan-output.txt
        continue-on-error: true

      # ── Fallback path: focused static scan when no ARM creds ─────────────────
      - name: Checkov — focused static scan (fallback)
        if: steps.arm-creds.outputs.available != 'true'
        run: |
          echo "## Checkov static scan — gold-tier modules"
          for module in storage keyvault aks; do
            echo ""
            echo "### terraform/modules/${module}/"
            checkov -d terraform/modules/${module} \
              --framework terraform \
              --compact \
              --soft-fail 2>&1
          done | tee checkov-plan-output.txt
        continue-on-error: true

      - name: Upload Checkov plan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-plan-report
          path: checkov-plan-output.txt
          if-no-files-found: ignore
