# .github/workflows/security-check.yml
#
# Unified Terraform Security Check — runs on every PR touching terraform/
#
# Layers:
#   1. Checkov  — IaC static analysis (all terraform/ files)
#              ↳ Enriched with MCSB control metadata + exception cross-reference
#   2. tfsec    — deterministic rule scan (gold-tier modules only)
#   3. AI check — Azure OpenAI semantic analysis against MCSB Must-priority
#                 controls + exception gate (gold-tier modules only)
#
# Posts ONE unified comment on the PR. Updates it on re-runs.

name: "🔒 Terraform Security Check"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Layer 1: Checkov ──────────────────────────────────────────────────
      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        id: checkov
        run: |
          checkov -d terraform/ \
            --framework terraform \
            --output cli \
            --output json \
            --output-file-path . \
            --soft-fail 2>&1 | tee checkov-cli.txt
          # cli output → checkov-cli.txt (logs), json output → results_terraform.json
          mv results_terraform.json checkov-output.json 2>/dev/null || true
        continue-on-error: true

      - name: Set up Python (Checkov enrichment)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enrich Checkov report
        id: checkov-enrich
        run: |
          python .github/scripts/checkov_enrich.py \
            --checkov-json checkov-output.json \
            --output checkov-enriched.txt
        continue-on-error: true

      - name: Checkov enrichment fallback
        if: steps.checkov-enrich.outcome != 'success'
        run: |
          PASSED=$(grep -oP 'Passed checks: \K\d+' checkov-cli.txt | tail -1 || echo "0")
          FAILED=$(grep -oP 'Failed checks: \K\d+' checkov-cli.txt | tail -1 || echo "0")
          SKIPPED=$(grep -oP 'Skipped checks: \K\d+' checkov-cli.txt | tail -1 || echo "0")
          printf "### 📋 Checkov IaC Scan\n\n| ✅ Passed | ❌ Failed | ⏭️ Skipped |\n|---|---|---|\n| ${PASSED} | ${FAILED} | ${SKIPPED} |\n" > checkov-enriched.txt

      # ── Detect gold-tier changes ──────────────────────────────────────────
      - name: Detect gold-tier Terraform changes
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            -- 'terraform/modules/storage/**' \
               'terraform/modules/keyvault/**' \
               'terraform/modules/aks/**' \
            | tr '\n' ' ' | xargs)
          echo "files=${FILES}" >> $GITHUB_OUTPUT
          echo "Changed gold-tier files: '${FILES}'"

      # ── Layers 2 & 3: tfsec + AI (gold-tier only) ────────────────────────
      - name: Install tfsec
        if: steps.changed.outputs.files != ''
        run: |
          TFSEC_VER=$(curl -s https://api.github.com/repos/aquasecurity/tfsec/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSL "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VER}/tfsec-linux-amd64" \
            -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec on gold-tier modules
        if: steps.changed.outputs.files != ''
        run: |
          tfsec terraform/modules/ \
            --include-passed \
            --format json \
            --out tfsec-output.json \
            --soft-fail
        continue-on-error: true

      - name: Install Python dependencies
        if: steps.changed.outputs.files != ''
        run: pip install requests

      - name: Run AI Security Check
        id: ai-check
        if: steps.changed.outputs.files != ''
        continue-on-error: true
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
        run: |
          python .github/scripts/azure_openai_tf_check.py \
            --changed-files ${{ steps.changed.outputs.files }} \
            --tfsec-output tfsec-output.json \
            --output ai-check-output.txt

      - name: No gold-tier changes detected
        if: steps.changed.outputs.files == ''
        run: |
          printf '_No gold-tier Terraform changes detected — AI Security Check skipped._\n' \
            > ai-check-output.txt

      # ── Enforce gate decision ─────────────────────────────────────────────
      - name: Enforce security gate
        if: always()
        run: |
          if [ -f ai-check-output.txt ] && grep -q "Gate: BLOCKED" ai-check-output.txt; then
            echo "::error::Security gate BLOCKED — unregistered FAIL findings must be remediated or registered in exceptions-registry.json before merging."
            exit 1
          fi
          echo "Security gate passed."

      # ── Post unified report ───────────────────────────────────────────────
      - name: Post unified security report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let checkovSection = '';
            try {
              checkovSection = fs.readFileSync('checkov-enriched.txt', 'utf8').trim();
            } catch (e) {
              checkovSection = '⚠️ _Checkov enriched report not available._';
            }

            let aiSection = '';
            try {
              aiSection = fs.readFileSync('ai-check-output.txt', 'utf8').trim();
            } catch (e) {
              aiSection = '_AI Security Check output not available._';
            }

            const blocked  = aiSection.includes('Gate: BLOCKED');
            const checkovFailed = checkovSection.includes('❌ FAIL');
            const overall  = blocked
              ? '❌ **Gate BLOCKED — action required**'
              : '✅ **All checks passed**';

            const now    = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const run    = `[#${{ github.run_number }}](${runUrl})`;

            const body = [
              `## 🔒 Terraform Security Report — ${overall}`,
              ``,
              `> PR **#${{ github.event.pull_request.number }}** · Branch \`${{ github.head_ref }}\` · Run ${run} · ${now}`,
              ``,
              `---`,
              ``,
              checkovSection,
              ``,
              `---`,
              ``,
              aiSection,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🔒 Terraform Security Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body.slice(0, 65000),
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body.slice(0, 65000),
              });
            }
