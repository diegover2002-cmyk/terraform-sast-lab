name: "🚦 Validate PR Target Branch"

# Enforces the branching strategy: only develop and release/* can merge into main.
# Feature/fix/chore branches must integrate through develop first.

on:
  pull_request:
    branches: [main]

jobs:
  validate-target:
    name: Validate source branch
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          head="${{ github.head_ref }}"
          echo "PR source branch: $head"
          echo "PR target branch: ${{ github.base_ref }}"

          if [[ "$head" == "develop" || "$head" =~ ^release/ ]]; then
            echo "✅ Source branch '$head' is allowed to merge into main."
          else
            echo ""
            echo "❌ Direct PRs to 'main' from '$head' are not allowed."
            echo ""
            echo "Branching strategy:"
            echo "  feature/* | fix/* | chore/* | demo/*  →  PR to 'develop'"
            echo "  develop                                →  PR to 'main' (release)"
            echo "  release/*                              →  PR to 'main' (hotfix)"
            echo ""
            echo "Please retarget this PR to 'develop' or merge into develop first."
            exit 1
          fi
